<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | cellXion Ltd</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://doyacbaoeytnqivpsels.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gK-xj6a23FK1rUfAUf0R6Q_BCeji8aE';
    </script>
</head>
<body class="login-page">

    <img src="images/x-png.png" id="custom-cursor" alt="Cursor">

    <div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></div>

    <div id="ui-layer">
        <header>
            <div class="logo">
                <img class="logo-img" src="images/x-png.png" alt="Logo">
                <div>
                    <span class="logo-text-main">CELLXION LTD</span>
                    <p class="nav-secondary">Cellular Intelligence Solutions</p>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="solutions.html">QMTS</a></li>
                    <li><a href="gdpr.html">GDPR</a></li>
                    <li><a href="login.html" style="color: #ff0000;">Log in</a></li>
                </ul>
            </nav>
        </header>

        <main class="login-main">
            <div class="login-container">
                <h1>Member Access</h1>
                <p>Enter your registered email to receive a secure login link.</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required autocomplete="email">
                    </div>
                    <button type="submit" id="submit-btn" class="cta-btn">Request Access</button>
                </form>
                
                <div id="message" style="margin-top: 1.5rem; font-family: monospace; font-size: 0.9rem; min-height: 1.2em;"></div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Initialize Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        // 2. Secure Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim().toLowerCase();
            
            // UI Reset
            messageDiv.style.color = "#ffffff";
            messageDiv.innerText = "CHECKING AUTHORIZATION...";
            submitBtn.disabled = true;

            try {
                // A. Call the Secure Database Function (RPC)
                // This keeps your actual whitelist table invisible to the public
                const { data: isAuthorized, error: rpcError } = await supabaseClient
                    .rpc('check_user_exists', { email_to_check: email });

                if (rpcError) throw new Error("Connection error. Please try again later.");
                
                if (!isAuthorized) {
                    throw new Error("Access Denied: Email not on authorized list.");
                }

                // B. Trigger Magic Link
                const { error: authError } = await supabaseClient.auth.signInWithOtp({
                    email: email,
                    options: {
                        // Ensure this matches your Supabase Redirect URL setting
                        emailRedirectTo: window.location.origin + '/index.html',
                    }
                });

                if (authError) throw authError;

                messageDiv.style.color = "#00ff00";
                messageDiv.innerText = "SUCCESS: Check your inbox for the magic link.";

            } catch (err) {
                messageDiv.style.color = "#ff0000";
                messageDiv.innerText = err.message.toUpperCase();
                submitBtn.disabled = false;
            }
        });

        // 3. Visuals (Background Animation)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const globe = new THREE.Mesh(
            new THREE.IcosahedronGeometry(15, 2),
            new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.1 })
        );
        scene.add(globe);
        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // Cursor logic
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
