<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cellXion Ltd | Global Telecommunications</title>
    <link rel="preload" href="images/qmts-v1.glb" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home">

    <img src="images/x-png.png" id="custom-cursor" alt="Cursor">

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <header>
            <div class="logo">
                <img class="logo-img" src="images/x-png.png" alt="Logo">
                <div>
                    <span class="logo-text-main">CELLXION LTD</span>
                    <p class="nav-secondary">Cellular Intelligence Solutions</p>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="solutions.html">QMTS</a></li>
                    <li><a href="gdpr.html">GDPR</a></li>
                    <li><a href="login.html">Log in</a></li>
                </ul>
            </nav>
        </header>

        <div class="hero">
            <h1>Next-Generation Connectivity</h1>
            <p>Empowering the UK and the world with cutting-edge telecommunications infrastructure, high-speed networking, and innovative data solutions.</p>
            <button class="cta-btn" onclick="location.href='solutions.html'">Learn More</button>
        </div>

        <!-- <div class="footer-info">
            Registered in the UK; Company Number 4780952; VAT Number 822 5778 14
        </div> -->

        <div class="footer-info">
            Design by Matt Stone - Iron Raven Design Studio 2026
        </div>
    </div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        camera.position.x = 0; // Centered to span the full screen width

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. Create the 3D Telecom Network (Icosahedron Geometry)
        const networkGroup = new THREE.Group();
        scene.add(networkGroup);

        // The Core Wireframe Globe
        const geometry = new THREE.IcosahedronGeometry(15, 2);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xff0000, 
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });
        const globe = new THREE.Mesh(geometry, material);
        networkGroup.add(globe);

        // The Data Nodes (Particles)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 800;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            // Spread particles mostly around the globe radius
            posArray[i] = (Math.random() - 0.5) * 40;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            color: 0xff3333,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        networkGroup.add(particlesMesh);

        // 5. Mouse Interaction
        const customCursor = document.getElementById('custom-cursor');
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        // Restore last known mouse position
        const savedCursorX = sessionStorage.getItem('cursorX');
        const savedCursorY = sessionStorage.getItem('cursorY');
        if (savedCursorX && savedCursorY) {
            customCursor.style.left = savedCursorX + 'px';
            customCursor.style.top = savedCursorY + 'px';
        } else {
            customCursor.style.opacity = '0';
        }

        document.addEventListener('mousemove', (event) => {
            customCursor.style.opacity = '1';
            customCursor.style.left = event.clientX + 'px';
            customCursor.style.top = event.clientY + 'px';
            sessionStorage.setItem('cursorX', event.clientX);
            sessionStorage.setItem('cursorY', event.clientY);
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 6. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Base rotation
            networkGroup.rotation.y += 0.002;
            networkGroup.rotation.x += 0.001;
            
            // Particle wave effect
            particlesMesh.rotation.y = -elapsedTime * 0.05;

            // Smooth mouse interaction (Parallax effect)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            networkGroup.rotation.y += 0.05 * (targetX - networkGroup.rotation.y);
            networkGroup.rotation.x += 0.05 * (targetY - networkGroup.rotation.x);

            renderer.render(scene, camera);
        }

        animate();

        // 7. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
